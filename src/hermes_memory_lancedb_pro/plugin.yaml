name: lancedb_pro
version: 0.11.1
description: "LanceDB memory provider — hybrid BM25+vector search with Weibull decay and tier management"
configurable: true
pip_dependencies:
  - lance
  - lancedb>=0.20.0
  - numpy>=1.24.0
  - sentence-transformers>=3.0.0
  - requests>=2.31.0
optional_pip_dependencies:
  - openai>=1.0.0
  - anthropic>=0.30.0
  - google-auth>=2.0.0
hooks:
  - prefetch
  - before_prompt_build
  - sync_turn
  - on_memory_write
  - on_recall_used
  - on_tool_call_observed
  - on_session_switch
  - shutdown
  - on_session_end
env_vars:
  - key: MEMORY_EXTRACTION_API_KEY
    description: "API key for LLM-driven memory extraction (optional)"
    secret: true
    required: false
  - key: MEMORY_EXTRACTION_BASE_URL
    description: "Base URL for LLM extraction endpoint (optional)"
    secret: false
    required: false
  - key: MEMORY_EXTRACTION_MODEL
    description: "Model name for LLM extraction (optional)"
    secret: false
    required: false
  - key: MEMORY_EXTRACTION_PROVIDER
    description: "LLM provider for extraction: openai (default) or anthropic"
    secret: false
    required: false
  - key: MEMORY_PREFETCH_LIMIT
    description: "Max memories injected per turn (default: 5)"
    secret: false
    required: false
  - key: MEMORY_AUTO_PURGE_COOLDOWN_HOURS
    description: "Hours between automatic archive purges (default: 24; 0 = off)"
    secret: false
    required: false
  - key: MEMORY_PURGE_GRACE_DAYS
    description: "Min age in days before archived rows are deleted (default: 30)"
    secret: false
    required: false
  - key: MEMORY_SESSION_SUMMARY_MAX_CHARS
    description: "Char budget for session-summary memories (default: 4000; 0 = off)"
    secret: false
    required: false
  - key: MEMORY_ADMISSION_PRESET
    description: "Admission gate: balanced / conservative / high-recall / off (default: balanced)"
    secret: false
    required: false
  - key: MEMORY_REFLECTION
    description: "Capture & replay session reflections: on / off (default: on)"
    secret: false
    required: false
  - key: MEMORY_AUTO_COMPACT_COOLDOWN_HOURS
    description: "Hours between automatic memory compaction runs (default: 168; 0 = off)"
    secret: false
    required: false
  - key: MEMORY_EXTRACTION_RATE_LIMIT
    description: "Max LLM extraction calls per hour; falls back to raw writes when hit (default: 0 = unlimited)"
    secret: false
    required: false
