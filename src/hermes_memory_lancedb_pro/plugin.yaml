name: lancedb_pro
version: 0.9.4
description: "LanceDB memory provider — hybrid BM25+vector search with Weibull decay and tier management"
pip_dependencies:
  - lance
  - lancedb>=0.20.0
  - numpy>=1.24.0
  - sentence-transformers>=3.0.0
  - requests>=2.31.0
optional_pip_dependencies:
  - openai>=1.0.0           # MEMORY_EXTRACTION_PROVIDER=openai (default)
  - anthropic>=0.30.0       # MEMORY_EXTRACTION_PROVIDER=anthropic
  - google-auth>=2.0.0      # Google Discovery Engine reranker
hooks:
  - prefetch
  - before_prompt_build
  - sync_turn
  - on_memory_write
  - on_recall_used
  - on_tool_call_observed
  - on_session_switch
  - shutdown
  - on_session_end
