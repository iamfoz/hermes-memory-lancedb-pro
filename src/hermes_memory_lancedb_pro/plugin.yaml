name: lancedb_pro
version: 0.13.0
kind: memory
description: "LanceDB memory provider — hybrid BM25+vector search with Weibull decay and tier management"
# `before_prompt_build` is intentionally NOT implemented: overriding it makes
# the host's prefetch_all() skip this provider, and the host never calls the
# hook anyway. on_recall_used / on_tool_call_observed are non-standard hooks
# (feat/memory-provider-hooks branch) and are inert when the host omits them.
hooks:
  - system_prompt_block
  - prefetch
  - sync_turn
  - on_pre_compress
  - on_memory_write
  - on_recall_used
  - on_tool_call_observed
  - on_session_switch
  - shutdown
  - on_session_end
